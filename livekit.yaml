# livekit.yaml
# LiveKit open-source server configuration for local development
# Docs: https://docs.livekit.io/home/self-hosting/local/

port: 7880
bind_addresses:
  - ""

rtc:
  port_range_start: 50000
  port_range_end: 60000
  use_external_ip: false

keys:
  devkey: devsecret-armenian-bank-agent

logging:
  json: false
  level: info